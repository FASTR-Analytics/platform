name: Sync Docs

on:
  push:
    branches:
      - main
    paths:
      - 'server/**/*.ts'
      - 'client/src/**/*.tsx'
      - 'client/src/**/*.ts'
      - 'lib/**/*.ts'
      - 'VERSION'
  workflow_dispatch:
    inputs:
      diff_base:
        description: 'Commit SHA to diff against (defaults to previous deploy commit)'
        required: false

permissions:
  contents: read

jobs:
  sync-docs:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Deploy version')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: FASTR-Analytics/site
          token: ${{ secrets.SITE_REPO_PAT }}
          path: _site_repo

      - name: Sync docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          BEFORE_SHA: ${{ github.event.before }}
          DIFF_BASE_OVERRIDE: ${{ inputs.diff_base }}
        run: bash .github/scripts/sync-docs.sh
